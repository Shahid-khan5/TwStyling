name: Release

# Tag the commit you want to ship, e.g.:  git tag v0.1.0-preview.1 && git push origin v0.1.0-preview.1
# Or run it by hand from the Actions tab with an explicit version.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to pack and publish, e.g. 0.1.0-preview.2'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest

    # Publishing uses nuget.org Trusted Publishing (OIDC), not a stored API key.
    # The matching policy on nuget.org must name:
    #   owner Shahid-khan5 / repo Tw.Maui / workflow release.yml / environment (blank)
    # Do NOT add `environment:` to this job unless you also set it on the policy — the
    # OIDC claims have to match exactly or the token exchange is rejected.
    permissions:
      id-token: write   # lets GitHub mint the OIDC token nuget.org validates
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SourceLink embeds the commit; shallow clones lose it

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          fi

      - name: Restore workloads
        run: dotnet workload restore src/Tw.Maui/Tw.Maui.csproj

      - name: Test
        run: dotnet test tests/Tw.Core.Tests/Tw.Core.Tests.csproj -c Release

      # Only the two packable projects. The Gallery sample is deliberately not built
      # here: it is a WinExe needing the win-x64 runtime pack, and nothing about
      # shipping the packages depends on it.
      - name: Pack
        run: |
          dotnet pack src/Tw.Core/Tw.Core.csproj -c Release -o artifacts -p:Version=${{ env.VERSION }}
          dotnet pack src/Tw.Maui/Tw.Maui.csproj -c Release -o artifacts -p:Version=${{ env.VERSION }}

      # Runs last, right before the pushes: the key it returns expires after 1 hour.
      # `user` is the nuget.org profile name that owns the packages — not an email.
      - name: NuGet login (OIDC -> short-lived API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: shahidkhandev

      # TwCore first: TwMaui depends on it. Pushing the dependent package before its
      # dependency is indexed leaves it briefly uninstallable.
      # Each .nupkg push carries its matching .snupkg symbol package automatically.
      #
      # No --skip-duplicate. It swallows HTTP 409 and reports success, which turned a
      # release that published nothing into a green run. A conflict here is a real
      # problem and must fail the workflow.
      - name: Push TwCore
        run: >
          dotnet nuget push artifacts/TwCore.${{ env.VERSION }}.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json

      - name: Push TwMaui
        run: >
          dotnet nuget push artifacts/TwMaui.${{ env.VERSION }}.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json

      # Only on failure. `dotnet nuget push` reports the status code but not the body,
      # and the body is where nuget.org explains *why* it rejected the push. Replaying
      # the same PUT with curl cannot double-publish: if the real push had succeeded,
      # this step never runs.
      - name: Explain push failure
        if: failure() && steps.login.outcome == 'success'
        shell: bash
        run: |
          for pkg in TwCore TwMaui; do
            echo "===== PUT $pkg.$VERSION.nupkg ====="
            curl -sS -i -X PUT \
              -H "X-NuGet-ApiKey: ${{ steps.login.outputs.NUGET_API_KEY }}" \
              -H "X-NuGet-Client-Version: 6.0.0" \
              -F "package=@artifacts/$pkg.$VERSION.nupkg" \
              https://www.nuget.org/api/v2/package | sed -n '1,20p'
            echo ""
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: packages
          path: artifacts/*.*nupkg
