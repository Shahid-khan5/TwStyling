name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    # Tw.Maui needs the MAUI workload; the Gallery sample targets net10.0-windows.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore workloads
        run: dotnet workload restore Tw.slnx

      - name: Build library
        run: dotnet build src/Tw.Maui/Tw.Maui.csproj -c Release

      - name: Test
        run: dotnet test tests/Tw.Core.Tests/Tw.Core.Tests.csproj -c Release

      - name: Pack (verifies packaging stays healthy)
        run: |
          dotnet pack src/Tw.Core/Tw.Core.csproj -c Release -o artifacts
          dotnet pack src/Tw.Maui/Tw.Maui.csproj -c Release -o artifacts

      # Separate, and last: the sample is a WinExe, so it needs the win-x64 runtime
      # pack that a plain restore won't fetch. Keep it out of the packaging steps —
      # a broken sample must never be able to block a release.
      - name: Build sample
        run: dotnet build samples/Gallery/Gallery.csproj -c Release -r win-x64 --self-contained false

      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/*.*nupkg
