name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    # Tw.Maui needs the MAUI workload; the Gallery sample targets net10.0-windows.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore workloads
        run: dotnet workload restore Tw.slnx

      - name: Restore
        run: dotnet restore Tw.slnx

      - name: Build
        run: dotnet build Tw.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/Tw.Core.Tests/Tw.Core.Tests.csproj -c Release --no-build

      - name: Pack (verifies packaging stays healthy)
        run: dotnet pack Tw.slnx -c Release --no-build -o artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/*.*nupkg
