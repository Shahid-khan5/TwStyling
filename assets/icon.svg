<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-labelledby="t d">
  <title id="t">Tw</title>
  <desc id="d">Tailwind utility styling for native .NET UI — utility classes flowing through a native control.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="128" rx="28" fill="url(#sheen)"/>

  <!-- the native control -->
  <rect x="28" y="34" width="72" height="60" rx="14"
        fill="#ffffff" fill-opacity=".12"
        stroke="#ffffff" stroke-opacity=".55" stroke-width="4"/>

  <!-- utility classes: the last one breaks the frame -->
  <g stroke="#ffffff" stroke-width="8" stroke-linecap="round">
    <line x1="44" y1="50" x2="84" y2="50" stroke-opacity=".95"/>
    <line x1="44" y1="64" x2="68" y2="64" stroke-opacity=".60"/>
    <line x1="44" y1="78" x2="110" y2="78"/>
  </g>
</svg>
